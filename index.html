<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lunch Picker</title>
  <!-- Awesomplete CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Lunch Picker</h1>
    <p>Can't decide? Let us help!</p>
  </header>

  <main>
<div class="input-group" id="inputGroup">
  <input class="lunch-input awesomplete" id="option1" placeholder="Choose or type an option" />
  <input class="lunch-input awesomplete" id="option2" placeholder="Choose or type an option" />
  <button id="addOptionBtn" type="button">Add Another Option</button>
  <button id="decideBtn">Decide</button>
</div>

    <p id="result" class="result">
      <span id="spinner" class="spinner" style="display: none;"></span>
      <span id="resultText">Please select your lunch options!</span>
    </p>
  </main>

  <footer>
    <p>&copy; 2025 Lunch Picker App</p>
  </footer>


<audio id="chime" preload="auto">
  <source src="success-340660.mp3" type="audio/mp3">
  Your browser does not support the audio element.
</audio>
<!-- Awesomplete JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
